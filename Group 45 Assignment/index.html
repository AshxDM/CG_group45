<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/layout.css">

    <title>The Helmet Forge</title>
</head>

<body>


    <div id="welcome">
        <h1>THE HELMET FORGE</h1>
        <p>Craft, customise, and explore legendary helmets in 3D.</p>
        <p>Use your mouse to rotate, zoom, and inspect your creation.</p>
    </div>



    <script type='x-shader/x-vertex' id='vertexShader'>
        attribute float alpha;
        varying float vAlpha;
        void main() {
            vAlpha = alpha;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = 2.0;
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script type='x-shader/x-fragment' id='fragmentShader'>
        uniform vec3 color;
        varying float vAlpha;
        void main() {
            gl_FragColor = vec4(color, vAlpha);
        }
    </script>


    <!-- Your scripts -->

    <script src="Task3.1/build.js"></script>
    <script src="Task3.1/setup.js"></script>
    <script src="Task3.1/run.js"></script>

</body>

</html>
